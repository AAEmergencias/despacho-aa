<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CAD Operador</title>

    <style>
        body { margin:0; background:#111; color:white; font-family:Arial; }
        #layout { display:flex; height:100vh; }
        #sidebar { width:300px; background:#1f1f1f; padding:15px; overflow-y:auto; }
        #map { flex:1; }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

<div id="layout">
    <div id="sidebar">

        <h2>CAD Operador</h2>

        <!-- BOTONES -->
        <button id="btnLogin" onclick="window.location.href='../login.html'"
            style="padding:8px 12px; background:#444; color:white; border:1px solid #666;">
            Iniciar sesión
        </button>

        <button id="btnLogout" onclick="logout()"
            style="padding:8px 12px; background:#333; color:white; border:1px solid #666; display:none;">
            Cerrar sesión
        </button>

        <button onclick="window.location.href='../public/index.html'"
            style="padding:8px 12px; background:#222; color:white; border:1px solid #666; margin-top:10px;">
            Ir al inicio
        </button>

        <h3>Vehículos</h3>
        <div id="vehicleList"></div>

        <h3>Estados</h3>
        <button onclick="setVehicleState('6-3')">6-3 En el lugar</button>
        <button onclick="setVehicleState('6-8')">6-8 Disponible</button>
        <button onclick="setVehicleState('6-9')">6-9 Se retira</button>
        <button onclick="setVehicleState('6-10')">6-10 En base</button>

    </div>

    <div id="map"></div>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.4"></script>
<script src="../scripts/supabaseClient.js"></script>
<script src="../scripts/auth.js"></script>
<script src="../scripts/vehicles.js"></script>

<script>
    protectRoute(["operador", "admin"]);
    renderSessionButtons();
</script>

</body>
</html>
