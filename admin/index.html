<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Panel Administrador</title>

    <style>
        body { margin: 0; background: #111; color: white; font-family: Arial; }
        #layout { display: flex; height: 100vh; }
        #sidebar { width: 300px; background: #1f1f1f; padding: 15px; }
        #map { flex: 1; background: #000; }
    </style>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>

<div id="layout">
    <div id="sidebar">
        <h2>Panel Administrador</h2>
        <p>Aquí podrás gestionar usuarios y claves radiales.</p>
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- SUPABASE LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.4"></script>

<!-- Supabase Client -->
<script src="../scripts/supabaseClient.js"></script>

<!-- Sistema de autenticación -->
<script src="../scripts/auth.js"></script>

<!-- Vehicles + Mapa -->
<script src="../scripts/vehicles.js"></script>

<!-- Proteger ruta ADMIN -->
<script>
    protectRoute(["admin"]);
</script>

</body>
</html>
