<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Panel Administrador</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        #layout {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 300px;
            background: #1f1f1f;
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        #map {
            flex: 1;
            background: #000;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            background: #333;
            color: white;
            border: 1px solid #666;
        }
    </style>

    <!-- Leaflet CSS CORRECTO -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

</head>

<body>

    <div id="layout">

        <div id="sidebar">
            <h2>Panel Administrador</h2>
            <p>Aquí podrás gestionar usuarios y claves radiales.</p>

            <button onclick="logout()">Cerrar sesión</button>
        </div>

        <div id="map"></div>

    </div>

    <!-- Leaflet JS CORRECTO -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Supabase -->
    <script src="../scripts/supabaseClient.js"></script>

    <!-- Sistema de autenticación -->
    <script src="../scripts/auth.js"></script>

    <!-- Vehicles + mapa Voyager -->
    <script src="../scripts/vehicles.js"></script>

    <script>
        protectRoute(["admin"]);
    </script>

</body>
</html>
