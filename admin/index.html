<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel Administrador</title>

    <style>
        body { margin:0; background:#111; color:white; font-family:Arial; }
        #layout { display:flex; height:100vh; }
        #sidebar { width:300px; background:#1f1f1f; padding:15px; }
        #map { flex:1; }
        button { padding:8px 12px; cursor:pointer; }
    </style>

    https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
</head>

<body>

<!-- 🔵 BOTÓN DE CAMBIO DE MAPA -->
<button onclick="toggleMapTheme()"
        style="position:absolute; top:15px; left:15px; z-index:9999; padding:8px 12px;">
    Cambiar Mapa
</button>

<div id="layout">

    <div id="sidebar">
        <h2>Panel Administrador</h2>
        <p>Aquí podrás gestionar usuarios y claves radiales.</p>
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- 🔵 MAPA ADMIN (antes no aparecía) -->
    <div id="map"></div>
</div>

<!-- 🔵 LIBRERÍA LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 🔵 SUPABASE -->
<script src="../scripts/supabaseClient.js"></script>

<!-- 🔵 SISTEMA DE AUTENTICACIÓN -->
<script src="../scripts/auth.js"></script>

<!-- 🔵 SISTEMA DE VEHÍCULOS (INCLUYE EL MAPA) -->
<script src="../scripts/vehicles.js"></script>

<script>
protectRoute(["admin"]);
</script>

</body>
</html>
