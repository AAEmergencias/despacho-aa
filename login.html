<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - CAD</title>

    <style>
        body { background:#111; color:white; font-family:Arial; padding:40px; }
        input { padding:10px; width:260px; display:block; margin-bottom:12px; background:#222; border:1px solid #444; color:white; }
        button { padding:10px 20px; background:#333; color:white; border:1px solid #666; cursor:pointer; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.4"></script>
    <script src="scripts/supabaseClient.js"></script>
    <script src="scripts/auth.js"></script>
</head>

<body>

<h2>Iniciar Sesión</h2>

<input id="email" type="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<script>
    const session = localStorage.getItem("sb_session");
    const role = localStorage.getItem("sb_role");

    if (session && role) {
        if (role === "admin") window.location.href = "admin/index.html";
        if (role === "operador") window.location.href = "operator/index.html";
        if (role === "visor") window.location.href = "public/index.html";
    }
</script>

</body>
</html>
