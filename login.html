<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - CAD</title>
</head>

<body style="font-family: Arial; padding: 25px; background: #111; color: white;">
    <h2>Login</h2>

    <input id="email" type="email" placeholder="Correo" 
           style="padding:8px; width:250px;"><br><br>

    <input id="password" type="password" placeholder="Contraseña" 
           style="padding:8px; width:250px;"><br><br>

    <button onclick="login()" 
            style="padding:10px 20px; cursor:pointer;">
        Ingresar
    </button>

    <!-- Librería Supabase (CORRECTA) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.4"></script>

    <!-- Cliente Supabase -->
    <script src="scripts/supabaseClient.js"></script>

    <!-- Sistema de Autenticación -->
    <script src="scripts/auth.js"></script>

</body>
</html>
